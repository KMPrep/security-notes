<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>architecture.png</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ccc;
      overflow: hidden;
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 8px 16px;
      background: rgba(20,20,20,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; gap: 12px;
      z-index: 100;
      font-size: 0.85em;
    }
    .header .title { font-weight: 600; color: #fff; }
    .header .path  { font-size: 0.8em; color: #888; font-family: monospace; }
    #wrap {
      position: fixed; inset: 40px 0 60px 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      cursor: grab;
    }
    #wrap.dragging { cursor: grabbing; }
    #zimg {
      max-width: none; max-height: none;
      transform-origin: center center;
      user-select: none; pointer-events: none;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    #controls {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px; align-items: center;
      background: rgba(20,20,20,0.9);
      padding: 7px 18px; border-radius: 24px;
      z-index: 100;
    }
    #controls button {
      background: none;
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff; font-size: 1.1em;
      width: 34px; height: 34px;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #controls button:hover { background: rgba(255,255,255,0.15); }
    #level { color: #ccc; font-size: 0.82em; min-width: 46px; text-align: center; font-family: monospace; }
    #hint {
      position: fixed; top: 44px; left: 50%;
      transform: translateX(-50%);
      color: rgba(200,200,200,0.55);
      font-size: 0.73em; pointer-events: none; z-index: 100;
    }
  </style>
<style>
/* mobile-responsive-v1 */
@media (max-width:600px){
  body{padding:18px 14px;font-size:16px;line-height:1.6}
  h1{font-size:1.55em}
  h2{font-size:1.3em}
  h3{font-size:1.12em}
  pre{padding:12px}
  table{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .mermaid,img,svg{max-width:100%;height:auto}
}
</style>
</head>
<body>
  <div class="header">
    <span class="title">&#128443; architecture.png</span>
    <span class="path">scenarios\1_hour_long\Q12\architecture.png</span>
  </div>
  <span id="hint">Scroll to zoom &nbsp;&middot;&nbsp; Drag to pan &nbsp;&middot;&nbsp; +/&minus; keys &nbsp;&middot;&nbsp; 0 to reset</span>
  <div id="wrap">
    <img id="zimg" src="architecture.png" alt="architecture.png">
  </div>
  <div id="controls">
    <button id="btn-out"   title="Zoom out">&#8722;</button>
    <span   id="level">100%</span>
    <button id="btn-in"    title="Zoom in">&#43;</button>
    <button id="btn-reset" title="Reset">&#8635;</button>
  </div>
  <script>
  (function () {
    var wrap  = document.getElementById('wrap');
    var zimg  = document.getElementById('zimg');
    var level = document.getElementById('level');
    var scale = 1, tx = 0, ty = 0;
    var MIN = 0.05, MAX = 20, STEP = 0.2;

    function apply() {
      zimg.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
      level.textContent = Math.round(scale * 100) + '%';
    }
    function reset() { scale = 1; tx = 0; ty = 0; apply(); }

    document.getElementById('btn-in').addEventListener('click',    function () { scale = Math.min(MAX, scale + STEP); apply(); });
    document.getElementById('btn-out').addEventListener('click',   function () { scale = Math.max(MIN, scale - STEP); apply(); });
    document.getElementById('btn-reset').addEventListener('click', reset);

    document.addEventListener('keydown', function (e) {
      if (e.key === '+' || e.key === '=') { scale = Math.min(MAX, scale + STEP); apply(); }
      if (e.key === '-')                  { scale = Math.max(MIN, scale - STEP); apply(); }
      if (e.key === '0')                  { reset(); }
    });

    wrap.addEventListener('wheel', function (e) {
      e.preventDefault();
      var r  = wrap.getBoundingClientRect();
      var cx = e.clientX - r.left  - r.width  / 2;
      var cy = e.clientY - r.top   - r.height / 2;
      var d  = e.deltaY < 0 ? STEP : -STEP;
      var ns = Math.min(MAX, Math.max(MIN, scale + d));
      var ratio = ns / scale;
      tx = cx + ratio * (tx - cx);
      ty = cy + ratio * (ty - cy);
      scale = ns;
      apply();
    }, { passive: false });

    var drag = false, dsx = 0, dsy = 0, stx = 0, sty = 0;
    wrap.addEventListener('mousedown', function (e) {
      drag = true; wrap.classList.add('dragging');
      dsx = e.clientX; dsy = e.clientY; stx = tx; sty = ty;
      e.preventDefault();
    });
    document.addEventListener('mousemove', function (e) {
      if (!drag) return;
      tx = stx + (e.clientX - dsx);
      ty = sty + (e.clientY - dsy);
      apply();
    });
    document.addEventListener('mouseup', function () { drag = false; wrap.classList.remove('dragging'); });

    var ld = 0, ps = 1;
    wrap.addEventListener('touchstart', function (e) {
      if (e.touches.length === 2) {
        ld = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        ps = scale;
      } else if (e.touches.length === 1) {
        drag = true; dsx = e.touches[0].clientX; dsy = e.touches[0].clientY; stx = tx; sty = ty;
      }
    }, { passive: true });
    wrap.addEventListener('touchmove', function (e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        scale = Math.min(MAX, Math.max(MIN, ps * (d / ld))); apply();
      } else if (e.touches.length === 1 && drag) {
        tx = stx + (e.touches[0].clientX - dsx); ty = sty + (e.touches[0].clientY - dsy); apply();
      }
    }, { passive: false });
    wrap.addEventListener('touchend', function () { drag = false; });
  })();
  </script>
</body>
</html>
